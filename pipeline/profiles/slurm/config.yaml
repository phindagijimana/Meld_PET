executor: slurm
jobs: 5
printshellcmds: True
rerun-incomplete: True
restart-times: 3
latency-wait: 60

default-resources:
  mem_mb: 8000
  runtime: 120
  cpus_per_task: 1
  slurm_partition: "general"

set-resources:
  petprep:
    mem_mb: 32000
    cpus_per_task: 4
    runtime: 480
  meld:
    mem_mb: 64000
    cpus_per_task: 8
    runtime: 1440
  register:
    mem_mb: 16000
    cpus_per_task: 2
    runtime: 120
  visualize:
    mem_mb: 8000
    runtime: 30
  prepare:
    mem_mb: 4000
    runtime: 20
