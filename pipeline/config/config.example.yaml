# ===========================================================================
# config.example.yaml — site template for the MELD + PET pipeline
#
# Copy to config/config.yaml and edit paths for your environment:
#   cp config/config.example.yaml config/config.yaml
# ===========================================================================

# --- Project layout --------------------------------------------------------
project_root:  /path/to/Meld_PET
pipeline_dir:  /path/to/Meld_PET/pipeline
data_dir:      /path/to/Meld_PET/data
work:          /path/to/Meld_PET/work
mapping:       /path/to/Meld_PET/PET_BIDS_SUB.csv
resolution_csv: ""   # optional: PET_session_resolution.csv (same format as Meld_CBF)
samples:       /path/to/Meld_PET/pipeline/config/samples.tsv

# --- BIDS + PETPrep ---------------------------------------------------------
bids_root:     /path/to/CIDUR_BIDS/data_bids
petprep_out:   /path/to/Meld_PET/work/petprep_derivatives
fallback_session: ses-1

# Glob (under petprep_out) to locate the PET reference in anatomical space.
# {sub} and {session} are substituted per sample row.
petprep_ref_glob: "{sub}/{session}/pet/{sub}_{session}_space-*T1w*desc-*pet*.nii.gz"

# --- PETPrep container ------------------------------------------------------
petprep_sif:   /path/to/petprep.sif
# Build with: apptainer build petprep.sif docker://ghcr.io/nipreps/petprep:0.0.6
petprep_image: ghcr.io/nipreps/petprep:0.0.6
petprep_use_apptainer: true
apptainer_bin: apptainer

# --- MELD container assets --------------------------------------------------
meld_install:    /path/to/meld_graph/meld_data
sif:             /path/to/meld_graph/meld_data/docker_version/meld_graph_v2.2.4.sif
fs_license:      /path/to/meld_graph/meld_data/docker_version/freesurfer_license.txt
meld_license:    /path/to/meld_graph/meld_data/docker_version/meld_license.txt
models_src:      /path/to/meld_graph/meld_data/models
meld_params_src: /path/to/meld_graph/meld_data/meld_params
container_tag:   meld_graph_v2.2.4
freesurfer_home_in: /opt/freesurfer-7.2.0
meld_fastsurfer: false

# --- Tracer / statistics ----------------------------------------------------
# deficit: lower uptake in lesion vs mirror/contra is concordant (FDG hypometabolism)
# excess:  higher uptake in lesion is concordant (some binding tracers)
tracer_mode: deficit          # deficit | excess
abnormal_z: -1.5              # z threshold for spatial concordance (sign-aware)
asym_concordance_pct: -8.0    # roi_asym_pct threshold (negative = ipsilateral deficit)
dice_concordance: 0.10

# --- Production options -----------------------------------------------------
allow_partial_aggregate: true
nas_dest: /mnt/nfs/Gugger_Lab/MELD_PET

# --- Resource hints (SLURM profile) -----------------------------------------
resources:
  prepare:   { mem_mb: 4000,  cpus_per_task: 1, runtime: 20 }
  petprep:   { mem_mb: 32000, cpus_per_task: 4, runtime: 480 }
  meld:      { mem_mb: 64000, cpus_per_task: 8, runtime: 1440 }
  register:  { mem_mb: 16000, cpus_per_task: 2, runtime: 120 }
  visualize: { mem_mb: 8000,  cpus_per_task: 1, runtime: 30 }
